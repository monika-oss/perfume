<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer Red Ring -->
  <circle cx="50" cy="50" r="48" fill="#bd1212" />
  
  <!-- Inner White Circle -->
  <circle cx="50" cy="50" r="35" fill="#ffffff" />
  
  <!-- Outer Red Ring Detail Line -->
  <circle cx="50" cy="50" r="37.5" fill="none" stroke="#bd1212" stroke-width="0.5" />
  
  <!-- Text Paths -->
  <defs>
    <!-- Top arc path: goes clockwise from left to right (curves UP) -->
    <path id="top-arc" d="M 14,50 A 36,36 0 0,1 86,50" fill="none" />
    <!-- Bottom arc path: goes counter-clockwise from right to left (curves DOWN) -->
    <path id="bottom-arc" d="M 86,50 A 36,36 0 0,0 14,50" fill="none" />
  </defs>
  
  <!-- Curved Text -->
  <text>
    <textPath href="#top-arc" startOffset="50%" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="7px" letter-spacing="0.8px">&#10022; SAI TIRUPATI &#10022;</textPath>
  </text>
  <text>
    <textPath href="#bottom-arc" startOffset="50%" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="5.8px" letter-spacing="0.4px">TRADING ENTERPRISES</textPath>
  </text>

  <!-- Monogram Monolith group (S & T Interlinked in Dark Royal Blue) -->
  <g id="monogram" fill="#0c2340">
    <!-- T top bar -->
    <path d="M 32,28 L 68,28 L 68,34 L 54,34 L 54,36 L 46,36 L 46,34 L 32,34 Z" />
    
    <!-- T vertical stem (drawn in sections to overlay under/over S) -->
    <rect x="46" y="34" width="8" height="28" />

    <!-- S curve background/foreground shape -->
    <path d="M 64,34 C 64,34 60,29 50,29 C 40,29 34,34 34,40 C 34,48 66,46 66,54 C 66,61 58,65 50,65 C 40,65 34,60 34,60 L 35,53 C 35,53 42,59 50,59 C 58,59 58,55 54,53 C 44,50 34,48 34,40 C 34,31 43,23 52,23 C 60,23 65,28 65,28 Z" />
    
    <!-- Intersecting details (White grid boxes in center to match poster) -->
    <rect x="46" y="44" width="8" height="8" fill="#0c2340" />
    <rect x="47.5" y="45.5" width="2" height="2" fill="#ffffff" />
    <rect x="50.5" y="45.5" width="2" height="2" fill="#ffffff" />
    <rect x="47.5" y="48.5" width="2" height="2" fill="#ffffff" />
    <rect x="50.5" y="48.5" width="2" height="2" fill="#ffffff" />
    
    <!-- Serif foot of T vertical stem -->
    <path d="M 43,62 L 57,62 L 54,58 L 46,58 Z" />
  </g>
</svg>
